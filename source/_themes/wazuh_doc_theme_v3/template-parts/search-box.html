<div class="search-box" role="search">
  {%- set path_to_search = pathto('search') -%}
  {%- if environment == "dev" or environment == "production" -%}
    {%- if pagename == "not_found" -%}
      {%- set path_to_search = '/current/' + path_to_search -%}
    {% endif %}
  {% endif %}
  <form method="get" class="search-form" action="{{ path_to_search }}" id="search-form">
    <label class="visually-hidden" for="search-input">Search term</label>
    {% if  pagename == 'index' %}
    <input id="search-input" type="text" class="form-control" name="q" placeholder="What can we help you find?"></input>
    {% else %}
    <input id="search-input" type="text" class="form-control" name="q" placeholder="Search"></input>
    {% endif %}
    <span id="search-btn-label" class="visually-hidden">Search now!</span>
    <button aria-labelledby="search-btn-label" type="submit" class="btn-search"></button>
    <input type="hidden" name="check_keywords" value="yes" />
    <input type="hidden" name="area" value="default" />
  </form>
</div>
